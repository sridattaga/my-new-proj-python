# Unique project key in SonarQube
sonar.projectKey=python-app
sonar.projectName=Python App
sonar.projectVersion=1.0

# Source code directories
sonar.sources=.

# Exclude unnecessary directories/files (venv, build artifacts, docs, cache)
sonar.exclusions=**/venv/**,**/__pycache__/**,**/dist/**,**/build/**,**/*.md,**/*.txt

# Optional: Python coverage report (if you use pytest-cov)
# sonar.python.coverage.reportPaths=coverage.xml

# Optional: Tests folder (if you want test coverage)
# sonar.tests=tests
# sonar.test.inclusions=tests/**/*.py
