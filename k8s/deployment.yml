apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-devops-app
  template:
    metadata:
      labels:
        app: python-devops-app
        annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: python-app
        image: sridatta5157/python-devops-app:latest
        ports:
        - containerPort: 5000
